<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Борис Арчегов | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --menu-bg: rgba(0, 0, 0, 0.7); 
            --item-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --ui-radius: 5px; /* Скругления 5px по запросу */
            --gap-size: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            color: #fff;
            padding: 0 var(--gap-size); 
        }

        body::-webkit-scrollbar { display: none; }

        /* --- ЭФФЕКТЫ КРАЕВ --- */
        .edge-overlay {
            position: fixed;
            left: 0; right: 0;
            height: 140px;
            z-index: 900;
            pointer-events: none;
        }

        .edge-top {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        .edge-bottom {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            mask-image: linear-gradient(to top, black, transparent);
        }

        /* --- ВЕРХНЕЕ МЕНЮ --- */
        .menu-wrapper {
            position: fixed;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 300px;
        }

        .floating-nav {
            background: var(--menu-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: var(--ui-radius);
            padding: 0 8px;
            transition: var(--transition);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 64px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-height: 64px;
        }

        .floating-nav:hover { 
            max-height: 450px; 
            height: auto; 
            padding-bottom: 12px;
        }

        .nav-header {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            height: 64px;
            padding: 0 8px;
        }

        .logo { 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1.2px;
            text-align: left; /* Выключка влево */
            flex-grow: 1;
        }

        .nav-links { 
            display: flex; flex-direction: column; gap: 6px;
            opacity: 0; transition: opacity 0.4s ease;
            pointer-events: none; padding: 4px 0 0 0;
        }

        .floating-nav:hover .nav-links { opacity: 1; pointer-events: auto; }

        .nav-links a { 
            text-decoration: none; color: #fff; font-size: 10px; font-weight: 500; 
            text-transform: uppercase; letter-spacing: 1px;
            background: var(--item-bg); padding: 14px 16px;
            border-radius: var(--ui-radius); transition: 0.3s;
        }

        .nav-links a:hover { background: rgba(255, 255, 255, 0.12); }

        .burger-box {
            width: 32px; height: 32px; 
            background: rgba(255,255,255,0.05);
            border-radius: var(--ui-radius); 
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .line { height: 1.2px; background: #fff; width: 14px; transition: var(--transition); position: absolute; }
        .line-1 { transform: translateY(-3.5px); }
        .line-2 { transform: translateY(3.5px); }
        .floating-nav:hover .line-1 { transform: rotate(45deg) translateY(0); }
        .floating-nav:hover .line-2 { transform: rotate(-45deg) translateY(0); }

        /* --- СЕТКА КАРТОЧЕК --- */
        #infinite-grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr);
            gap: var(--gap-size); 
            width: 100%; 
            padding-top: 10px; /* Отступ 10px от верхнего края */
            padding-bottom: 120px;
        }

        .card {
            position: relative; 
            aspect-ratio: 1 / 1.3; 
            overflow: hidden;
            background: #0a0a0a; 
            border-radius: var(--ui-radius); 
            cursor: pointer;
        }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            display: block; opacity: 0;
            transition: opacity 0.5s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card img.loaded { opacity: 1; }

        .card-overlay {
            position: absolute; inset: 0; 
            background: rgba(0, 0, 0, 0.65);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: var(--transition); 
            text-align: center; padding: 20px;
            backdrop-filter: blur(5px);
        }

        .card:hover img { transform: scale(1.1); }
        .card:hover .card-overlay { opacity: 1; }

        .project-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .project-category { font-size: 11px; font-weight: 400; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- НИЖНИЙ ВИДЖЕТ --- */
        .bottom-widget {
            position: fixed;
            bottom: 30px; 
            left: 30px; /* Отодвинуто на 30px от левого края */
            z-index: 1000;
            display: flex; align-items: flex-end; gap: 10px;
        }

        .glass-panel {
            background: var(--menu-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: var(--ui-radius);
            display: flex; align-items: center; transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-card {
            padding: 10px; width: 200px; cursor: pointer;
            overflow: hidden; display: flex; flex-wrap: wrap; align-content: flex-start;
        }

        .profile-card:hover { 
            width: 400px; /* Увеличено для свободного текста */
            padding: 18px; 
        }

        .avatar { width: 48px; height: 48px; border-radius: var(--ui-radius); object-fit: cover; flex-shrink: 0; }
        
        .profile-info { 
            margin-left: 14px; 
            display: flex; 
            align-items: center; 
            height: 48px; 
        }

        .profile-name { 
            font-size: 14px; 
            font-weight: 600; 
            text-transform: uppercase; 
            white-space: nowrap; 
            letter-spacing: 0.5px; 
        }

        .profile-bio {
            font-size: 15px; /* Размер 15px по запросу */
            opacity: 0; 
            max-height: 0;
            transition: var(--transition); 
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5; 
            margin-top: 0; 
            flex-basis: 100%; 
            font-weight: 400;
            text-align: left;
        }

        .profile-card:hover .profile-bio { 
            opacity: 1; 
            max-height: 200px; 
            margin-top: 18px; 
        }

        .contact-btn { width: 68px; height: 68px; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        .contact-btn:hover { background: rgba(255, 255, 255, 0.12); }
        
        /* Иконки TG и Mail чуть меньше (18px) */
        .contact-btn svg { width: 18px; height: 18px; fill: #fff; transition: var(--transition); }
        .contact-btn:hover svg { transform: scale(1.1); }

        @media (max-width: 1200px) { #infinite-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { 
            #infinite-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-card:hover { width: 320px; }
            .bottom-widget { left: 15px; bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="edge-overlay edge-top"></div>
    <div class="edge-overlay edge-bottom"></div>

    <div class="menu-wrapper">
        <header class="floating-nav">
            <div class="nav-header">
                <div class="logo">Борис Арчегов</div>
                <div class="burger-box">
                    <div class="line line-1"></div>
                    <div class="line line-2"></div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="#">Обо мне</a>
                <a href="#">Проекты</a>
                <a href="#">Презентация</a>
                <a href="#">Контакты</a>
            </nav>
        </header>
    </div>

    <div id="infinite-grid"></div>

    <div class="bottom-widget">
        <div class="glass-panel profile-card">
            <img src="ABV.jpg" alt="Борис Арчегов" class="avatar">
            <div class="profile-info">
                <span class="profile-name">Борис Арчегов</span>
            </div>
            <p class="profile-bio">I create clean, timeless photography and video that tell stories through light and motion.</p>
        </div>
        
        <a href="mailto:mail@example.com" class="glass-panel contact-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 666.67 533.33"><path d="M526.67,533.33H140c-41.27,0-64.01,0-85.4-10.9-18.94-9.64-34.05-24.76-43.7-43.7C0,457.34,0,434.61,0,393.33v-253.33c0-2.07,0-4.1,0-6.08,0-.43,0-.86,0-1.29.04-36.68.66-57.95,10.9-78.03,9.65-18.94,24.76-34.05,43.7-43.7C76,0,98.73,0,140,0h386.67c41.27,0,64.01,0,85.4,10.9,18.94,9.65,34.05,24.76,43.7,43.7,10.23,20.08,10.86,41.35,10.89,78.03,0,.43,0,.86,0,1.29,0,1.98,0,4.01,0,6.08v253.33c0,41.27,0,64.01-10.9,85.4-9.65,18.94-24.76,34.05-43.7,43.7-21.39,10.9-44.12,10.9-85.4,10.9ZM66.67,195.62v197.72c0,28.91,0,48,3.63,55.13,3.22,6.31,8.25,11.35,14.56,14.56,7.13,3.64,26.23,3.64,55.14,3.64h386.67c28.91,0,48,0,55.13-3.63,6.32-3.22,11.35-8.25,14.57-14.56,3.63-7.13,3.63-26.23,3.63-55.14v-197.72l-129.84,86.56c-44.55,29.7-69.1,46.06-97.98,52.99-25.41,6.09-52.27,6.09-77.68,0-28.89-6.92-53.43-23.28-97.97-52.98l-129.85-86.57ZM66.79,115.57l166.71,111.14c39.43,26.28,59.21,39.47,76.54,43.63,15.24,3.65,31.36,3.65,46.61,0,17.33-4.15,37.12-17.35,76.54-43.63l166.71-111.14c-.25-15.37-1.04-25.83-3.52-30.7-3.22-6.31-8.25-11.35-14.57-14.57-7.13-3.63-26.23-3.63-55.13-3.63H140c-28.91,0-48,0-55.13,3.63-6.31,3.22-11.35,8.25-14.57,14.57-2.48,4.87-3.27,15.34-3.52,30.7Z"/></svg>
        </a>

        <a href="https://t.me/example" target="_blank" class="glass-panel contact-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 699.93 586.98"><path d="M697.93,53.42l-105.63,498.12c-7.98,35.15-28.75,43.9-58.27,27.35l-160.95-118.6-77.65,74.7c-8.6,8.6-15.77,15.78-32.35,15.78l11.58-163.9L572.93,117.35c12.97-11.55-2.83-17.97-20.15-6.4l-368.75,232.2-158.75-49.7c-34.53-10.77-35.15-34.52,7.2-51.1L653.41,3.12c28.75-10.77,53.9,6.4,44.53,50.33v-.02Z"/></svg>
        </a>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThPj1nz9v2i0_OKxOzsJhhQ92-KhNHCUUp-bNL6_BQs02Ggt_UgNOa1RRWmxwxBBWC4347WpEzrR65/pub?output=csv';
        const grid = document.getElementById('infinite-grid');

        // Парсинг CSV с учетом кавычек
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.slice(1) 
                .filter(line => line.trim() !== '')
                .map(line => {
                    // Регулярка для корректного разделения запятых, игнорируя те, что в кавычках
                    const columns = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!columns) return null;
                    return {
                        title: columns[0]?.replace(/"/g, '').trim(),
                        category: columns[1]?.replace(/"/g, '').trim(),
                        image: columns[2]?.replace(/"/g, '').trim(),
                        link: columns[3]?.replace(/"/g, '').trim()
                    };
                }).filter(item => item !== null);
        }

        function createCard(data) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const link = document.createElement('a');
            link.href = data.link || '#';
            link.target = "_blank";
            link.style.textDecoration = 'none';
            link.style.color = 'inherit';

            const img = document.createElement('img');
            img.src = data.image; 
            img.onload = () => img.classList.add('loaded');
            
            const overlay = document.createElement('div');
            overlay.className = 'card-overlay';
            overlay.innerHTML = `
                <div class="project-title">${data.title}</div>
                <div class="project-category">${data.category}</div>
            `;
            
            link.appendChild(img);
            link.appendChild(overlay);
            card.appendChild(link);
            return card;
        }

        async function initPortfolio() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const projectsData = parseCSV(csvText);
                
                grid.innerHTML = '';
                projectsData.forEach(project => {
                    grid.appendChild(createCard(project));
                });
            } catch (error) {
                console.error('Data load error:', error);
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">Загрузка данных...</p>';
            }
        }

        initPortfolio();
    </script>
</body>
</html>
