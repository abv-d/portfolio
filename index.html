<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Борис Арчегов | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap');

        :root {
            --bg-black: #000000;
            --menu-bg: rgba(0, 0, 0, 0.7); 
            --item-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            --ui-radius: 5px; 
            --gap-size: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            font-family: 'Onest', sans-serif;
            overflow-x: hidden;
            color: #fff;
            padding: 0 var(--gap-size); 
            
            /* --- ДОБАВЛЕНО ДЛЯ ПЕРЕХОДА --- */
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        /* Классы состояния страницы */
        body.loaded { opacity: 1; }
        body.fade-out { opacity: 0; }

        body::-webkit-scrollbar { display: none; }

        /* --- ЭФФЕКТЫ КРАЕВ --- */
        .edge-overlay {
            position: fixed; left: 0; right: 0; height: 120px; z-index: 900; pointer-events: none;
        }
        .edge-top { top: 0; background: linear-gradient(to bottom, black 0%, transparent 100%); }
        .edge-bottom { bottom: 0; background: linear-gradient(to top, black 0%, transparent 100%); }

        /* --- ВЕРХНЕЕ МЕНЮ --- */
        .menu-wrapper {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 300px;
        }
        .floating-nav {
            background: var(--menu-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: var(--ui-radius); padding: 0 8px; transition: var(--transition);
            height: 64px; border: 1px solid rgba(255, 255, 255, 0.08); overflow: hidden; max-height: 64px;
        }
        .floating-nav:hover { max-height: 450px; height: auto; padding-bottom: 12px; }
        .nav-header { display: flex; align-items: center; justify-content: space-between; height: 64px; padding: 0 12px; }
        .logo { font-size: 14px; font-weight: 500; text-align: left; flex-grow: 1; letter-spacing: -0.02em; }
        
        .nav-links { display: flex; flex-direction: column; gap: 6px; opacity: 0; transition: 0.3s; padding-top: 4px; }
        .floating-nav:hover .nav-links { opacity: 1; }
        .nav-links a { 
            text-decoration: none; color: #fff; font-size: 13px; font-weight: 400;
            background: var(--item-bg); padding: 14px 16px; border-radius: var(--ui-radius); transition: 0.3s;
        }
        .nav-links a:hover { background: rgba(255, 255, 255, 0.12); }
        
        .burger-box { width: 32px; height: 32px; background: rgba(255,255,255,0.05); border-radius: var(--ui-radius); display: flex; justify-content: center; align-items: center; position: relative; }
        .line { height: 1.2px; background: #fff; width: 14px; position: absolute; transition: var(--transition); }
        .line-1 { transform: translateY(-3.5px); }
        .line-2 { transform: translateY(3.5px); }
        .floating-nav:hover .line-1 { transform: rotate(45deg); }
        .floating-nav:hover .line-2 { transform: rotate(-45deg); }

        /* --- СЕТКА КАРТОЧЕК --- */
        #infinite-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--gap-size); 
            width: 100%; padding-top: 10px; padding-bottom: 160px;
        }
        .card {
            position: relative; aspect-ratio: 1 / 1.3; overflow: hidden;
            background: #0a0a0a; border-radius: var(--ui-radius); cursor: pointer;
            opacity: 0; transform: translateY(20px);
        }
        .card.visible {
            opacity: 1; transform: translateY(0);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover img { transform: scale(1.05); }
        
        .card-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; opacity: 0; transition: 0.4s ease; text-align: center; backdrop-filter: blur(5px);
        }
        .card:hover .card-overlay { opacity: 1; }
        
        .project-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; color: #fff; line-height: 1.2; }
        .project-category { font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.8); }

        /* --- НИЖНИЙ ВИДЖЕТ --- */
        .bottom-widget {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000; display: flex; align-items: flex-end; gap: 12px;
        }
        .glass-panel {
            background: var(--menu-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: var(--ui-radius); border: 1px solid rgba(255,255,255,0.05);
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1), padding 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .profile-card { 
            padding: 10px; width: 220px; display: flex; flex-direction: column; 
            overflow: hidden; cursor: pointer; transition-delay: 0.3s;
        }
        .profile-card:hover { width: 420px; padding: 20px; transition-delay: 0s; }

        .profile-top { display: flex; align-items: center; width: 100%; height: 48px; flex-shrink: 0; }
        .avatar { width: 48px; height: 48px; border-radius: var(--ui-radius); object-fit: cover; flex-shrink: 0; }
        .profile-name { margin-left: 16px; font-size: 15px; font-weight: 500; white-space: nowrap; color: #fff; letter-spacing: -0.01em; }

        .profile-bio {
            font-size: 14px; opacity: 0; max-height: 0; margin-top: 0; color: rgba(255, 255, 255, 0.7); 
            line-height: 1.5; pointer-events: none; font-weight: 300;
            transition: opacity 0.3s ease 0s, max-height 0.3s ease 0s, margin-top 0.3s ease 0s;
        }
        .profile-card:hover .profile-bio { 
            opacity: 1; max-height: 200px; margin-top: 20px; pointer-events: auto;
            transition: opacity 0.4s ease 0.3s, max-height 0.4s ease 0.3s, margin-top 0.4s ease 0.3s;
        }

        .contact-btn { width: 72px; height: 72px; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        .contact-btn:hover { background: rgba(255, 255, 255, 0.12); }
        .contact-btn svg { width: 22px; height: 22px; fill: #fff; transition: transform 0.3s ease; }
        .contact-btn:hover svg { transform: scale(1.1); }

        @media (max-width: 1200px) { #infinite-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { 
            #infinite-grid { grid-template-columns: repeat(2, 1fr); } 
            .profile-card:hover { width: 320px; }
            .bottom-widget { left: 15px; bottom: 15px; }
        }
    </style></head><body>

    <div class="edge-overlay edge-top"></div>
    <div class="edge-overlay edge-bottom"></div>

    <div class="menu-wrapper">
        <header class="floating-nav">
            <div class="nav-header">
                <div class="logo">Борис Арчегов</div>
                <div class="burger-box">
                    <div class="line line-1"></div>
                    <div class="line line-2"></div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="about.html" class="transition-link">Обо мне / Контакты</a>
                <a href="index.html" class="transition-link">Проекты</a>
                <a href="https://drive.google.com/file/d/1ENe9GrsC6ZGro17ZuocGdyjGRxdFWEGL/view?usp=drive_link" target="_blank">Презентация</a>
            </nav>
        </header>
    </div>

    <div id="infinite-grid"></div>

    <div class="bottom-widget">
        <div class="glass-panel profile-card">
            <div class="profile-top">
                <img src="ABV.jpg" alt="Борис Арчегов" class="avatar">
                <span class="profile-name">Борис Арчегов</span>
            </div>
            <p class="profile-bio">Привет. Я графический дизайнер с большим опытом работы в области брендинга и диджитал.</p>
        </div>
        
        <a href="mailto:b.archegov@gmail.com" class="glass-panel contact-btn">
            <svg viewBox="0 0 24 24"><path d="M20,4H4C2.9,4,2,4.9,2,6v12c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V6C22,4.9,21.1,4,20,4z M20,18H4V8l8,5l8-5V18z M12,11L4,6h16L12,11z"/></svg>
        </a>

        <a href="https://t.me/Boris_Archegov" target="_blank" class="glass-panel contact-btn">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
        </a>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThPj1nz9v2i0_OKxOzsJhhQ92-KhNHCUUp-bNL6_BQs02Ggt_UgNOa1RRWmxwxBBWC4347WpEzrR65/pub?output=csv';
        const grid = document.getElementById('infinite-grid');

        /* --- ДОБАВЛЕНО ДЛЯ ПЛАВНОГО ПЕРЕХОДА --- */
        window.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('loaded');
        });

        document.querySelectorAll('.transition-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const targetUrl = this.href;
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500); 
            });
        });
        /* -------------------------------------- */

        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.slice(1).filter(line => line.trim() !== '').map(line => {
                const columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    title: columns[0]?.replace(/^"|"$/g, '').trim(),
                    category: columns[1]?.replace(/^"|"$/g, '').trim(),
                    image: columns[2]?.replace(/^"|"$/g, '').trim(),
                    link: columns[3]?.replace(/^"|"$/g, '').trim()
                };
            });
        }

        function createCard(data, index) {
            if (!data.image || data.image.length < 5) return null;
            const card = document.createElement('div');
            card.className = 'card';
            const link = document.createElement('a');
            link.href = data.link || '#';
            link.target = "_blank";
            link.style.textDecoration = 'none';
            const img = document.createElement('img');
            img.src = data.image;
            img.onload = () => { setTimeout(() => card.classList.add('visible'), index * 60); };
            img.onerror = () => { card.style.display = 'none'; };
            
            const overlay = document.createElement('div');
            overlay.className = 'card-overlay';
            overlay.innerHTML = `
                <div class="text-container">
                    <div class="project-title">${data.title || ''}</div>                    <div class="project-category">${data.category || ''}</div>                </div>`;            
            link.appendChild(img);
            link.appendChild(overlay);
            card.appendChild(link);
            return card;
        }

        async function initPortfolio() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const projectsData = parseCSV(csvText);
                grid.innerHTML = '';
                const fullList = [];
                for(let i=0; i<8; i++) fullList.push(...projectsData);
                fullList.forEach((project, i) => {
                    const card = createCard(project, i);
                    if (card) grid.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }
        initPortfolio();
    </script></body></html>
