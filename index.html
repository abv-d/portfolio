<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Борис Арчегов | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --menu-bg: rgba(0, 0, 0, 0.7); 
            --item-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            --ui-radius: 5px; 
            --gap-size: 12px; /* Увеличен зазор между карточками */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            color: #fff;
            padding: 0 20px; /* Боковые отступы как в шаблоне */
        }

        body::-webkit-scrollbar { display: none; }

        /* --- ЭФФЕКТЫ КРАЕВ --- */
        .edge-overlay {
            position: fixed;
            left: 0; right: 0;
            height: 100px;
            z-index: 900;
            pointer-events: none;
        }
        .edge-top { top: 0; background: linear-gradient(to bottom, black 0%, transparent 100%); }
        .edge-bottom { bottom: 0; background: linear-gradient(to top, black 0%, transparent 100%); }

        /* --- ВЕРХНЕЕ МЕНЮ --- */
        .menu-wrapper {
            position: fixed;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 280px;
        }

        .floating-nav {
            background: var(--menu-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--ui-radius);
            padding: 0 8px;
            transition: var(--transition);
            height: 64px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            max-height: 64px;
        }

        .floating-nav:hover { max-height: 400px; height: auto; padding-bottom: 10px; }

        .nav-header {
            display: flex; align-items: center; justify-content: space-between;
            height: 64px; padding: 0 10px;
        }

        .logo { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .nav-links { display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: 0.3s; padding-top: 5px; }
        .floating-nav:hover .nav-links { opacity: 1; }
        .nav-links a { 
            text-decoration: none; color: #aaa; font-size: 10px; text-transform: uppercase;
            padding: 12px; border-radius: var(--ui-radius); transition: 0.3s;
        }
        .nav-links a:hover { color: #fff; background: var(--item-bg); }

        .burger-box { width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; position: relative; }
        .line { height: 1px; background: #fff; width: 12px; position: absolute; transition: 0.3s; }
        .line-1 { transform: translateY(-3px); }
        .line-2 { transform: translateY(3px); }
        .floating-nav:hover .line-1 { transform: rotate(45deg); }
        .floating-nav:hover .line-2 { transform: rotate(-45deg); }

        /* --- СЕТКА (Размер как в Aerra) --- */
        #infinite-grid {
            display: grid; 
            grid-template-columns: repeat(6, 1fr); /* 6 колонок для мелкости */
            gap: var(--gap-size); 
            width: 100%; 
            max-width: 1600px;
            margin: 0 auto;
            padding-top: 100px; 
            padding-bottom: 150px;
        }

        .card {
            position: relative; 
            aspect-ratio: 1 / 1.2; 
            overflow: hidden;
            background: #0a0a0a; 
            border-radius: var(--ui-radius); 
            cursor: pointer;
            border: 1px solid transparent;
            transition: border 0.4s ease;
            /* Анимация появления */
            opacity: 0;
            transform: translateY(20px);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover { border: 1px solid rgba(255, 255, 255, 0.15); }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            display: block; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover img { transform: scale(1.03); }

        .card-overlay {
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15px; opacity: 0; transition: 0.4s ease;
        }

        .card:hover .card-overlay { opacity: 1; }

        .project-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .project-category { font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 2px; }

        /* --- НИЖНИЙ ВИДЖЕТ --- */
        .bottom-widget {
            position: fixed; bottom: 30px; left: 30px;
            z-index: 1000; display: flex; align-items: flex-end; gap: 8px;
        }

        .glass-panel {
            background: var(--menu-bg); backdrop-filter: blur(20px);
            border-radius: var(--ui-radius); border: 1px solid rgba(255,255,255,0.08);
            transition: var(--transition);
        }

        .profile-card { padding: 8px; width: 180px; display: flex; flex-wrap: wrap; overflow: hidden; }
        .profile-card:hover { width: 380px; padding: 15px; }

        .avatar { width: 40px; height: 40px; border-radius: var(--ui-radius); object-fit: cover; }
        .profile-info { margin-left: 12px; display: flex; align-items: center; height: 40px; }
        .profile-name { font-size: 12px; font-weight: 600; text-transform: uppercase; }

        .profile-bio {
            font-size: 14px; opacity: 0; max-height: 0; margin-top: 0;
            transition: var(--transition); color: #aaa; flex-basis: 100%;
        }
        .profile-card:hover .profile-bio { opacity: 1; max-height: 150px; margin-top: 15px; }

        .contact-btn { width: 56px; height: 56px; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        .contact-btn svg { width: 16px; height: 16px; fill: #fff; }

        @media (max-width: 1400px) { #infinite-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 900px) { #infinite-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="edge-overlay edge-top"></div>
    <div class="edge-overlay edge-bottom"></div>

    <div class="menu-wrapper">
        <header class="floating-nav">
            <div class="nav-header">
                <div class="logo">Борис Арчегов</div>
                <div class="burger-box">
                    <div class="line line-1"></div>
                    <div class="line line-2"></div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="#">Обо мне</a>
                <a href="#">Проекты</a>
                <a href="#">Презентация</a>
                <a href="#">Контакты</a>
            </nav>
        </header>
    </div>

    <div id="infinite-grid"></div>

    <div class="bottom-widget">
        <div class="glass-panel profile-card">
            <img src="ABV.jpg" alt="Борис Арчегов" class="avatar">
            <div class="profile-info">
                <span class="profile-name">Борис Арчегов</span>
            </div>
            <p class="profile-bio">I create clean, timeless photography and video that tell stories through light and motion.</p>
        </div>
        <a href="mailto:mail@example.com" class="glass-panel contact-btn">
            <svg viewBox="0 0 24 24"><path d="M20,4H4C2.9,4,2,4.9,2,6v12c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V6C22,4.9,21.1,4,20,4z M20,18H4V8l8,5l8-5V18z M12,11L4,6h16L12,11z"/></svg>
        </a>
        <a href="https://t.me/example" target="_blank" class="glass-panel contact-btn">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
        </a>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThPj1nz9v2i0_OKxOzsJhhQ92-KhNHCUUp-bNL6_BQs02Ggt_UgNOa1RRWmxwxBBWC4347WpEzrR65/pub?output=csv';
        const grid = document.getElementById('infinite-grid');

        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.slice(1).filter(line => line.trim() !== '').map(line => {
                const columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    title: columns[0]?.replace(/^"|"$/g, '').trim(),
                    category: columns[1]?.replace(/^"|"$/g, '').trim(),
                    image: columns[2]?.replace(/^"|"$/g, '').trim(),
                    link: columns[3]?.replace(/^"|"$/g, '').trim()
                };
            });
        }

        function createCard(data, index) {
            if (!data.image || data.image.length < 5) return null;
            const card = document.createElement('div');
            card.className = 'card';
            
            const link = document.createElement('a');
            link.href = data.link || '#';
            link.target = "_blank";
            link.style.textDecoration = 'none';

            const img = document.createElement('img');
            img.src = data.image;
            img.onload = () => {
                // Плавное появление после загрузки
                setTimeout(() => card.classList.add('visible'), index * 50);
            };
            img.onerror = () => { card.style.display = 'none'; };

            const overlay = document.createElement('div');
            overlay.className = 'card-overlay';
            overlay.innerHTML = `
                <div class="project-title">${data.title || ''}</div>
                <div class="project-category">${data.category || ''}</div>
            `;
            
            link.appendChild(img);
            link.appendChild(overlay);
            card.appendChild(link);
            return card;
        }

        async function initPortfolio() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const projectsData = parseCSV(csvText);
                grid.innerHTML = '';
                
                // Дублируем для массы, чтобы увидеть эффект сетки
                const fullList = [...projectsData, ...projectsData, ...projectsData, ...projectsData];
                fullList.forEach((project, i) => {
                    const card = createCard(project, i);
                    if (card) grid.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        initPortfolio();
    </script>
</body>
</html>
